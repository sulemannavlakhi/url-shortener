name: Terraform Apply

on: 
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  apply:
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ secrets.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_CRED }}
          role-session-name: terraform-apply

      - name: Terraform Install
        uses: hashicorp/setup-terraform@v4

      - name: Terraform Init
        working-directory: terraform
        run: terraform init

      - name: Create tfvars file
        working-directory: terraform
        env:
          TF_VARS_CONTENT: ${{ secrets.TF_VARS }}
        run: echo "$TF_VARS_CONTENT" > terraform.tfvars

      - name: Terraform Plan and Apply
        working-directory: terraform
        run: |
          terraform plan -var-file="terraform.tfvars" -var="container_image_tag=${{ github.sha }}" -out=tfplan
          terraform apply -auto-approve tfplan