name: Docker Build and Push

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ca-central-1

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials with OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GITHUB_ACTIONS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push API
        run: |
          IMAGE="${{ steps.ecr.outputs.registry }}/ecsv2-dev-api"
          docker build -t "$IMAGE:${{ github.sha }}" -t "$IMAGE:latest" ./app
          docker push "$IMAGE:${{ github.sha }}"

      - name: Build and push Dashboard
        run: |
          IMAGE="${{ steps.ecr.outputs.registry }}/ecsv2-dev-dashboard"
          docker build -t "$IMAGE:${{ github.sha }}" -t "$IMAGE:latest" ./services/dashboard
          docker push "$IMAGE:${{ github.sha }}"

      - name: Build and push Worker
        run: |
          IMAGE="${{ steps.ecr.outputs.registry }}/ecsv2-dev-worker"
          docker build -t "$IMAGE:${{ github.sha }}" -t "$IMAGE:latest" ./services/worker
          docker push "$IMAGE:${{ github.sha }}"