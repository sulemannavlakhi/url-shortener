name: Docker Build and Push

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ca-central-1

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials with OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GITHUB_ACTIONS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build API image
        run: |
          IMAGE="${{ steps.ecr.outputs.registry }}/ecsv2-dev-api:${{ github.sha }}"
          docker build -t "$IMAGE" ./app

      - name: Scan API image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "${{ steps.ecr.outputs.registry }}/ecsv2-dev-api:${{ github.sha }}"
          format: table
          exit-code: 1
          severity: CRITICAL
          ignore-unfixed: true

      - name: Push API image
        run: |
          docker push "${{ steps.ecr.outputs.registry }}/ecsv2-dev-api:${{ github.sha }}"

      - name: Build Dashboard image
        run: |
          IMAGE="${{ steps.ecr.outputs.registry }}/ecsv2-dev-dashboard:${{ github.sha }}"
          docker build -t "$IMAGE" ./services/dashboard

      - name: Scan Dashboard image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "${{ steps.ecr.outputs.registry }}/ecsv2-dev-dashboard:${{ github.sha }}"
          format: table
          exit-code: 1
          severity: CRITICAL
          ignore-unfixed: true

      - name: Push Dashboard image
        run: |
          docker push "${{ steps.ecr.outputs.registry }}/ecsv2-dev-dashboard:${{ github.sha }}"

      - name: Build Worker image
        run: |
          IMAGE="${{ steps.ecr.outputs.registry }}/ecsv2-dev-worker:${{ github.sha }}"
          docker build -t "$IMAGE" ./services/worker

      - name: Scan Worker image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "${{ steps.ecr.outputs.registry }}/ecsv2-dev-worker:${{ github.sha }}"
          format: table
          exit-code: 1
          severity: CRITICAL
          ignore-unfixed: true

      - name: Push Worker image
        run: |
          docker push "${{ steps.ecr.outputs.registry }}/ecsv2-dev-worker:${{ github.sha }}"