name: ECS Api, Dashboard and Worker

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ca-central-1

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_GITHUB_ACTIONS_ROLE_ARN }}
          role-session-name: ecs-deploy

      - name: Deploy API via CodeDeploy
        run: |
          API_ARN=$(aws ecs describe-task-definition \
            --task-definition ecsv2-dev-api \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)

          aws deploy create-deployment \
            --application-name ecsv2-dev-ecs \
            --deployment-group-name ecsv2-dev-api-dg \
            --region ${{ env.AWS_REGION }} \
            --revision '{"revisionType":"AppSpecContent","appSpecContent":{"content":"{\"version\":0.0,\"Resources\":[{\"TargetService\":{\"Type\":\"AWS::ECS::Service\",\"Properties\":{\"TaskDefinition\":\"'"$API_ARN"'\",\"LoadBalancerInfo\":{\"ContainerName\":\"api\",\"ContainerPort\":8080}}}}]}"}}'

      - name: Deploy Dashboard via CodeDeploy
        run: |
          DASH_ARN=$(aws ecs describe-task-definition \
            --task-definition ecsv2-dev-dashboard \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)

          aws deploy create-deployment \
            --application-name ecsv2-dev-ecs \
            --deployment-group-name ecsv2-dev-dashboard-dg \
            --region ${{ env.AWS_REGION }} \
            --revision '{"revisionType":"AppSpecContent","appSpecContent":{"content":"{\"version\":0.0,\"Resources\":[{\"TargetService\":{\"Type\":\"AWS::ECS::Service\",\"Properties\":{\"TaskDefinition\":\"'"$DASH_ARN"'\",\"LoadBalancerInfo\":{\"ContainerName\":\"dashboard\",\"ContainerPort\":8081}}}}]}"}}'

      - name: Deploy Worker via ECS
        run: |
          WORKER_ARN=$(aws ecs describe-task-definition \
            --task-definition ecsv2-dev-worker \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)

          aws ecs update-service \
            --cluster ecsv2-dev-cluster \
            --service ecsv2-dev-worker \
            --task-definition $WORKER_ARN \
            --region ${{ env.AWS_REGION }}